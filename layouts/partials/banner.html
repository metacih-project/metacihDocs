<!-- banner -->
<div class="container section banner-hero">
  <div class="row">
    <div class="col-lg-10 text-center mx-auto">
      <div class="banner-title-block">
        <h1 class="banner-title text-white mb-4">
          {{ .Site.Params.banner.title | markdownify }}
        </h1>
      </div>
      <div class="position-relative banner-search-wrap">
        <input
          id="search"
          class="form-control"
          placeholder="{{ .Site.Params.banner.placeholder }}"
        />
        <i class="ti-search search-icon"></i>
        <!-- Javascript -->
        {{ $currentNode := . }} {{ $currentNode.Scratch.Set "pages" .Site.Pages
        }} {{ $pages := ($currentNode.Scratch.Get "pages") }} 
        <script>
          $(function() {
          var projects = [
          	{{ range $pages }}
          	{
          		value: "{{ .Title }}",
          		label: "<p>{{.Plain}}</p>{{range.Params.Keywords}}<p>{{.}}</p>{{end}}",
          		url:"{{ .Permalink }}"
          	},
          	{{ end }}
          ];
          $( "#search" ).autocomplete({
          	source: projects
          })
          .data( "ui-autocomplete" )._renderItem = function( ul, item ) {
          	return $( "<li>" )
          	.append( "<a href=" + item.url + " + \" &quot;\" +  >" + item.value + "</a>" + item.label )
          	.appendTo( ul );
          };
          });
        </script>
      </div>
    </div>
  </div>
</div>
<!-- /banner -->
